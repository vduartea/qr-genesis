name: Build & Deploy QR.app by FTPS

on:
  push:
    branches: [ main ]  # ajusta si usas otra rama
  workflow_dispatch: {} # permite ejecutarlo manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Build (Vite)
        run: npm run build

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R dist deploy/dist
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json
          mkdir -p deploy/tmp

      - name: Show build files
        run: |
          echo "dist:"
          find dist -maxdepth 3 -type f
          echo "deploy:"
          find deploy -maxdepth 3 -type f


      # 4 BACKEND: Instalar dependencias
      # No hay backend





      # 5 DEPLOY FRONTEND: Sube SOLO la carpeta dist/ al docroot del subdominio
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}   # 'ftps' recomendado
          local-dir: dist/client/
          server-dir: /qr.noniwa.cl/                          # porque el home del FTP es /home/noniwacl/qr.noniwa.cl/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
      # 6️ DEPLOY BACKEND
        ## No hay backend

      # 7️ REINICIAR BACKEND (Passenger)
      - name: Restart Node app via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/qr.noniwa.cl
            npm install --omit=dev
            mkdir -p tmp
            touch tmp/restart.txt

          


